<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>para vos</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    overflow-x: hidden;
    background: linear-gradient(180deg, #f7f9f5, #e9efe8);
    color: #1b1b1b;
}

/* 🌊 water background */
.water {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(120,180,160,0.35), transparent 60%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.6), transparent 55%),
        radial-gradient(circle at 50% 80%, rgba(140,210,180,0.25), transparent 60%);
    filter: blur(40px);
    animation: waterMove 12s ease-in-out infinite;
    opacity: 0.9;
}

@keyframes waterMove {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-20px) scale(1.05); }
    100% { transform: translate(0,0) scale(1); }
}

/* ✨ text */
.container {
    position: relative;
    z-index: 2;
    max-width: 720px;
    margin: 0 auto;
    padding: 120px 20px;
    text-align: center;
}

h1 {
    font-size: 28px;
    font-weight: 500;
    margin-bottom: 10px;
}

p {
    font-size: 18px;
    line-height: 1.7;
    color: #2a2a2a;
}

/* 🖼 floating photos */
.photo {
    position: absolute;
    width: 140px;
    height: 180px;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.12);
    backdrop-filter: blur(10px);
    opacity: 0.75;
    transform: translateY(0);
    animation: float 8s ease-in-out infinite;
}

.photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(1.05);
}

/* разные скорости */
.photo:nth-child(1){ top: 15%; left: 5%; animation-duration: 10s; }
.photo:nth-child(2){ top: 25%; right: 8%; animation-duration: 12s; }
.photo:nth-child(3){ top: 55%; left: 10%; animation-duration: 9s; }
.photo:nth-child(4){ top: 65%; right: 12%; animation-duration: 11s; }

@keyframes float {
    0% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(1deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}

/* glass block */
.card {
    margin-top: 40px;
    display: inline-block;
    padding: 16px 22px;
    border-radius: 16px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(12px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
}
</style>

</head>

<body>

<div class="water"></div>

<!-- 🖼 FLOATING PHOTOS -->
<div class="photo">
    <img src="photo1.jpg">
</div>

<div class="photo">
    <img src="photo2.jpg">
</div>

<div class="photo">
    <img src="photo3.jpg">
</div>

<div class="photo">
    <img src="photo4.jpg">
</div>

<!-- TEXT -->
<div class="container">

    <h1>hay personas que no hacen ruido…</h1>
    <p>pero cambian todo el ambiente.</p>
    <p>y vos sos una de esas.</p>

    <div class="card">
        tu energía no es obvia, pero se siente.
    </div>

    <p style="margin-top:40px;">
        sos calma… pero con fuego adentro. <br>
        simple… pero inolvidable.
    </p>

</div>

</body>
</html>
