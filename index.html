<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>para vos</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(180deg, #f7f9f5, #e9efe8);
    color: #1b1b1b;
    overflow-x: hidden;
}

/* 🌊 BACKGROUND */
.water {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
        radial-gradient(circle at 20% 30%, rgba(120,180,160,0.35), transparent 60%),
        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.6), transparent 55%),
        radial-gradient(circle at 50% 80%, rgba(140,210,180,0.25), transparent 60%);
    filter: blur(45px);
    animation: waterMove 14s ease-in-out infinite;
    opacity: 0.85;
}

@keyframes waterMove {
    0% { transform: translate(0,0) scale(1); }
    50% { transform: translate(25px,-15px) scale(1.05); }
    100% { transform: translate(0,0) scale(1); }
}

/* 🧠 LAYOUT */
.container {
    position: relative;
    z-index: 2;
    max-width: 760px;
    margin: 0 auto;
    padding: 120px 20px;
    text-align: center;
}

h1 { font-size: 28px; font-weight: 500; }

p {
    font-size: 18px;
    line-height: 1.7;
    color: #2a2a2a;
}

.card {
    margin-top: 20px;
    padding: 18px 22px;
    border-radius: 18px;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(14px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.06);
    display: inline-block;
}

.block { margin-top: 60px; }

/* 🖼 FLOATING PHOTOS — FIXED SMALL VERTICAL */
.photo {
    position: absolute;
    width: 95px;
    height: 135px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 18px 35px rgba(0,0,0,0.12);
    opacity: 0.8;
    animation: floatPhoto 10s ease-in-out infinite;
}

/* 🔥 ЖЁСТКАЯ ФИКСАЦИЯ КРОПА */
.photo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
}

/* позиции */
.photo:nth-of-type(1){ top: 12%; left: 6%; }
.photo:nth-of-type(2){ top: 25%; right: 8%; animation-duration: 12s; }
.photo:nth-of-type(3){ top: 55%; left: 12%; animation-duration: 11s; }
.photo:nth-of-type(4){ top: 68%; right: 10%; animation-duration: 13s; }

@keyframes floatPhoto {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-20px); }
    100% { transform: translateY(0px); }
}

/* 💧 RIPPLE */
.ripple {
    position: fixed;
    border-radius: 50%;
    transform: scale(0);
    animation: rippleAnim 900ms ease-out;
    background: rgba(255,255,255,0.35);
    pointer-events: none;
    z-index: 9999;
}

@keyframes rippleAnim {
    to {
        transform: scale(6);
        opacity: 0;
    }
}

/* ✨ EMOJIS */
.emoji {
    position: fixed;
    font-size: 20px;
    opacity: 0.6;
    z-index: 1;
    pointer-events: none;
    animation: emojiFloat linear infinite;
}

@keyframes emojiFloat {
    0% { transform: translateY(110vh); opacity: 0; }
    10% { opacity: 0.9; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

/* 📱 MOBILE */
@media (max-width: 768px) {

    .container {
        padding: 90px 16px;
    }

    h1 { font-size: 22px; }
    p { font-size: 15px; }

    .card {
        font-size: 14px;
        padding: 14px 16px;
    }

    .photo {
        position: relative;
        width: 100%;
        max-width: 320px;
        height: 220px;
        margin: 14px auto;
        animation: none;
        opacity: 0.9;
    }
}
</style>
</head>

<body>

<div class="water"></div>

<!-- 🖼 4 PHOTOS -->
<div class="photo"><img src="photo1.jpg"></div>
<div class="photo"><img src="photo2.jpg"></div>
<div class="photo"><img src="photo3.jpg"></div>
<div class="photo"><img src="photo4.jpg"></div>

<div class="container">

    <h1>hay personas que no hacen ruido…</h1>
    <p>pero cambian todo el ambiente.</p>
    <p>y vos sos una de esas.</p>

    <div class="block">
        <div class="card">tu energía no es obvia, pero se siente.</div>
    </div>

    <div class="block">
        <p>sos calma… pero con algo adentro que se nota.</p>
        <p>hay algo en vos que no se explica… pero se siente.</p>
    </div>

    <div class="block">
        <div class="card">no tenés que ser intensa para ser inolvidable.</div>
    </div>

</div>

<script>

/* 💧 ripple */
document.addEventListener("click", createRipple);
document.addEventListener("touchstart", e => {
    const t = e.touches[0];
    createRipple(t.clientX, t.clientY);
});

function createRipple(x, y) {
    const r = document.createElement("div");
    r.className = "ripple";

    const size = 90;
    r.style.width = size + "px";
    r.style.height = size + "px";
    r.style.left = (x - size/2) + "px";
    r.style.top = (y - size/2) + "px";

    document.body.appendChild(r);
    setTimeout(() => r.remove(), 900);
}

/* ✨ emojis */
const emojis = ["🔥","🤍","D","🌿","✨"];

for (let i = 0; i < 35; i++) {
    let e = document.createElement("div");
    e.className = "emoji";
    e.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    e.style.left = Math.random() * 100 + "vw";
    e.style.fontSize = (16 + Math.random() * 14) + "px";
    e.style.opacity = (0.4 + Math.random() * 0.5);
    e.style.animationDuration = (6 + Math.random() * 6) + "s";

    document.body.appendChild(e);
}

</script>

</body>
</html>
